services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma_db
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
