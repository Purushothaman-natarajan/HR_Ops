# Embedding configuration shared by vector store, semantic cache, and chunking.
# all-MiniLM-L6-v2: 384-dim sentence transformer, good balance of speed/accuracy.
#
# ── How embedding works ──────────────────────────────────────────────────
#
# 1. Text → Vector  ("embedding")
#    The SentenceTransformer encodes input text into a fixed-size vector
#    (384 floats for all-MiniLM-L6-v2). This is "embedding" — turning
#    language into mathematical coordinates so computers can measure
#    semantic similarity.
#
# 2. Storage
#    ChromaDB persists these vectors alongside the original document text.
#    Vectors are indexed with HNSW (hierarchical navigable small world)
#    for fast approximate nearest-neighbor search — O(log n) lookup even
#    with thousands of documents.
#
# 3. Real-time agent flow
#    a) User asks "What is the leave policy?"
#    b) Triage node classifies it as "policy"
#    c) Policy node calls similarity_search(query) which:
#       - Embeds the query in real-time (same SentenceTransformer)
#       - Finds the top-k closest vectors in Chroma via cosine similarity
#       - Returns the original document texts
#    d) Retrieved policy texts are injected into the LLM prompt as context
#    e) LLM generates an answer grounded in the retrieved policies —
#       this is Retrieval-Augmented Generation (RAG)
#
# 4. Semantic cache (cache.py)
#    Before calling the LLM, the policy node checks the semantic cache.
#    If a semantically similar query (cosine > similarity_threshold) was
#    answered recently (within ttl_seconds), the cached response is
#    returned instantly — skipping both vector search AND the LLM call.

embedding:
  model_name: all-MiniLM-L6-v2
  dimension: 384
  device: cpu                          # cpu | cuda
  normalize_embeddings: true
  batch_size: 32

vector_store:
  collection_name: hr_policies
  default_k: 4                         # top-k results for similarity_search
  persist_dir: ./backend/data/chroma_db  # fallback — .env CHROMA_PERSIST_DIR takes precedence

semantic_cache:
  similarity_threshold: 0.95           # 0–1; higher = stricter match, fewer cache hits
  ttl_seconds: 86400                   # 24 hours

reranker:
  enabled: false                       # false to skip re-ranking and use raw cosine similarity
  model: nvidia/rerank-qa-mistral-4b   # NVIDIA cross-encoder for second-pass re-ranking
  top_k: 4                             # docs to return after re-ranking
  timeout_seconds: 2.0                 # max wait for re-ranking; falls back to original order on timeout

trace_sampling:
  enabled: true                        # false to store all traces
  success_sample_rate: 0.1             # 10% of successful runs stored; 100% of errors stored

pii_redaction:
  enabled: true                        # false to skip PII redaction
  patterns:                            # regex patterns replaced in trace text fields
    - "\\b[\\w.-]+@[\\w.-]+\\.\\w+\\b"  # emails
    - "\\b\\d{3}-\\d{2}-\\d{4}\\b"      # SSNs (XXX-XX-XXXX)
    - "\\b\\d{9}\\b"                     # 9-digit IDs

alerting:
  enabled: true
  p99_threshold_ms: 10000              # alert if p99 > 10s
  error_rate_threshold_pct: 10.0       # alert if error rate > 10%
