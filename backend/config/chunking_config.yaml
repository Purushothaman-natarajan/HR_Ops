# Chunking strategy configuration for policy document ingestion.
# The default_strategy is used when no strategy is explicitly specified.

default_strategy: recursive   # Options: recursive, fixed_size, semantic, parent_document, agentic, late_chunking

strategies:
  recursive:
    # Splits text on separators in order: "\n\n" → "\n" → "." → " "
    chunk_size: 400           # Target chunk size in characters
    chunk_overlap: 80         # Characters of overlap between consecutive chunks
    separators:
      - "\n\n"
      - "\n"
      - "."
      - " "

  fixed_size:
    # Splits into fixed-size character windows with overlap
    chunk_size: 300
    chunk_overlap: 50

  semantic:
    # Uses embedding similarity to detect topic boundaries
    threshold: 0.75           # Similarity threshold for boundary detection
    min_chunk_size: 100       # Minimum chunk size to prevent tiny fragments
    max_chunk_size: 500       # Maximum chunk size to prevent oversized segments
    embedding_model: all-MiniLM-L6-v2

  parent_document:
    # Indexes small child chunks but returns full parent chunk on retrieval
    parent_chunk_size: 1000   # Size of the parent (returned) chunk
    child_chunk_size: 200     # Size of the child (indexed) chunk
    child_overlap: 40

  agentic:
    # Uses an LLM to determine natural chunk boundaries
    llm_model: gpt-4o-mini
    max_iterations: 3         # Max LLM calls per document

  late_chunking:
    # Defers chunk boundary decisions until retrieval time for context-awareness
    base_chunk_size: 400
    overlap: 80
