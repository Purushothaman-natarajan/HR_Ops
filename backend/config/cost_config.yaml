# Cost management and budget configuration.
# Thresholds are used for guardrail enforcement and alerting.
#
# model_costs_per_1k: Per-model token pricing (USD per 1,000 tokens).
#   Keys are matched by substring against the resolved model name.
#   Add or update entries here — no code changes needed.

model_costs_per_1k:
  gpt-4o:
    input: 0.005
    output: 0.015
  gpt-4o-mini:
    input: 0.00015
    output: 0.0006
  claude-3-haiku-20240307:
    input: 0.00025
    output: 0.00125
  llama-3.1-8b-instant:
    input: 0.0001
    output: 0.0004
  glm-5.1:
    input: 0.0002
    output: 0.0005
  deepseek-v4-flash:
    input: 0.0002
    output: 0.0005

budgets:
  monthly_usd: 500.0          # Hard monthly budget ceiling
  per_run_max_usd: 0.50       # Max cost allowed for a single graph execution

alerts:
  daily_threshold_usd: 20.0   # Alert if daily spend exceeds this amount
  weekly_threshold_usd: 125.0 # Alert if weekly spend exceeds this amount

cost_tiers:
  # Cost tiers map query complexity to model selection.
  # The model router selects the cheapest tier that satisfies the query's cost_floor.
  cheap:
    max_cost_usd: 0.01
    preferred_model: nvidia/meta/llama-3.1-8b-instruct
  standard:
    max_cost_usd: 0.05
    preferred_model: nvidia/meta/llama-3.1-8b-instruct
  premium:
    max_cost_usd: 0.50
    preferred_model: nvidia/meta/llama-3.1-8b-instruct

cost_weights:
  input_token: 1.0            # Multiplier for input token costs
  output_token: 2.0           # Multiplier for output token costs (output is more expensive)
