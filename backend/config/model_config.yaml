# Per-agent model routing configuration.
# Format for model entries: <provider>/<model-name>
# Example: openai/gpt-4o, anthropic/claude-3-haiku-20240307, groq/llama-3.1-8b-instant, nvidia/deepseek-ai/deepseek-v4-flash
#
# Per-agent fields:
#   primary             — preferred model for this agent
#   fallback            — model used when primary provider is unavailable
#   cost_floor          — minimum cost budget; cheaper queries use a lower tier
#   reasoning_effort    — NVIDIA-specific: "none" | "high" ("high" breaks some models — always use "none")
#   top_p               — nucleus sampling threshold (0.0–1.0)

default_provider: nvidia
default_model: nvidia/meta/llama-3.1-8b-instruct

agents:
  triage:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.95

  rag:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.95

  narrative:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.01
    reasoning_effort: none
    top_p: 0.95

  compliance:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.95

  anomaly:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.002
    reasoning_effort: none
    top_p: 0.95

  supervisor:
    primary: nvidia/meta/llama-3.1-8b-instruct
    fallback: nvidia/meta/llama-3.1-70b-instruct
    cost_floor: 0.01
    reasoning_effort: none
    top_p: 0.95
