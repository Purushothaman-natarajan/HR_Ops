# Per-agent model routing configuration.
# Format for model entries: <provider>/<model-name>
# Example: openai/gpt-4o, anthropic/claude-3-haiku-20240307, groq/llama-3.1-8b-instant, nvidia/z-ai/glm-5.1
#
# Per-agent fields:
#   primary             — preferred model for this agent
#   fallback            — model used when primary provider is unavailable
#   cost_floor          — minimum cost budget; cheaper queries use a lower tier
#   reasoning_effort    — NVIDIA-specific: "none" | "high" ("high" breaks some models — always use "none")
#   top_p               — nucleus sampling threshold (0.0–1.0)

default_provider: nvidia
default_model: nvidia/z-ai/glm-5.1

agents:
  triage:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.9

  rag:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.9

  narrative:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.01
    reasoning_effort: none
    top_p: 1.0

  compliance:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.001
    reasoning_effort: none
    top_p: 0.9

  anomaly:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.002
    reasoning_effort: none
    top_p: 0.9

  supervisor:
    primary: nvidia/z-ai/glm-5.1
    fallback: nvidia/z-ai/glm-5.1
    cost_floor: 0.01
    reasoning_effort: none
    top_p: 1.0
