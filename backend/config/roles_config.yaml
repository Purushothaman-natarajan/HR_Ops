# Role-based access control configuration.
# Priority order (highest first):
#   1. APP_ROLE environment variable
#   2. app_role field below (YAML fallback)
#   3. Hardcoded "admin" default in settings.py

app_role: admin               # Default role when APP_ROLE env var is not set

roles:
  admin:
    sections: ["main", "observability", "knowledge", "insights"]
    policy_crud: true         # Can upload, update, and delete policy documents
    can_access_trace: true    # Can view execution trace viewer and compare
    can_access_feedback: true # Can view RL dashboard and feedback stats

  user:
    sections: ["main"]        # Only sees the main navigation section (query, HITL, policies)
    policy_crud: false        # Policy management is view-only (no edit/delete buttons)
    can_access_trace: false   # Trace and RL sections are hidden
    can_access_feedback: false

# Section identifiers used in the frontend Sidebar component:
#   main          — Dashboard, Query Agent, HITL Requests, Policy Manager
#   observability — Trace Viewer, Trace Compare
#   knowledge     — Policy Manager (shows in sidebar with "(View)" suffix for user role)
#   insights      — RL Dashboard, Cost Monitor
