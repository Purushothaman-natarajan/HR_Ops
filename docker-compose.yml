services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma_db
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - backend_data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
